<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>用电量数据分析仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:24px}
.header .subtitle{font-size:13px;opacity:.85;margin-top:4px}
.container{max-width:1400px;margin:0 auto;padding:20px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat-card .label{font-size:13px;color:#666;margin-bottom:4px}
.stat-card .value{font-size:24px;font-weight:700;color:#1a73e8}
.controls{background:#fff;border-radius:8px;padding:16px 20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-size:12px;color:#666;font-weight:500}
.control-group select,.control-group input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;min-width:160px;outline:none}
.control-group select:focus,.control-group input:focus{border-color:#1a73e8;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:500}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-sm{padding:5px 12px;font-size:12px}
.uc{position:relative;min-width:240px}
.uc input{width:100%}
.ud{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ddd;border-radius:6px;max-height:260px;overflow-y:auto;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.ud.active{display:block}
.ud .item{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0}
.ud .item:hover{background:#e8f0fe;color:#1a73e8}
.ud .item.ai{font-weight:600;background:#f5f7fa}
.tabs{display:flex;background:#fff;border-radius:8px 8px 0 0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tab{padding:12px 24px;cursor:pointer;font-size:14px;font-weight:500;color:#666;border-bottom:3px solid transparent}
.tab:hover{color:#1a73e8;background:#f5f7fa}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8}
.tc{display:none}
.tc.active{display:block}
.sc{background:#fff;border-radius:0 0 8px 8px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px}
.sc .st{font-size:16px;font-weight:600;margin-bottom:16px;color:#333}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.cb{background:#fafafa;border-radius:8px;padding:16px}
.cb canvas{max-height:320px}
.cb h3{font-size:14px;color:#333;margin-bottom:12px}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{background:#f5f7fa;padding:8px 12px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #e0e0e0}
.dt td{padding:8px 12px;border-bottom:1px solid #f0f0f0}
.dt tr:hover td{background:#f8faff}
.hg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}
.hc{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);cursor:pointer;border-left:4px solid #1a73e8}
.hc:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.hc .hn{font-size:15px;font-weight:600}
.hc .hd{font-size:12px;color:#888;margin-top:4px}
.hc .ht{font-size:11px;display:inline-block;padding:2px 8px;border-radius:10px;margin-top:6px}
.hc .ht.g{background:#e8f5e9;color:#2e7d32}
.hc .ht.o{background:#fff3e0;color:#e65100}
.hdn{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px}
.hdn h3{font-size:16px;margin-bottom:12px}
.hps{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
@media(max-width:900px){.cr{grid-template-columns:1fr}}
@media(max-width:600px){.controls{flex-direction:column}}
</style>
</head>
<body>
<div class="header"><div><h1>用电量数据分析仪表盘</h1><div class="subtitle" id="ds">加载中...</div></div>
<button class="btn btn-primary btn-sm" onclick="location.reload()">刷新</button></div>
<div class="container">
<div class="stats-row">
<div class="stat-card"><div class="label">用户总数</div><div class="value" id="su">-</div></div>
<div class="stat-card"><div class="label">数据记录</div><div class="value" id="sr">-</div></div>
<div class="stat-card"><div class="label">数据月份</div><div class="value" id="sm">-</div></div>
<div class="stat-card"><div class="label">总用电量(MWh)</div><div class="value" id="st">-</div></div>
</div>
<div class="controls">
<div class="control-group"><label>选择用户</label><div class="uc">
<input type="text" id="us" placeholder="输入用户名称搜索..." autocomplete="off">
<div class="ud" id="ud"></div></div></div>
<div class="control-group"><label>选择月份</label><select id="ms"><option value="">全部月份</option></select></div>
<div class="control-group"><label>选择日期</label><select id="ds2"><option value="">全部日期</option></select></div>
<div class="control-group" style="padding-top:18px"><button class="btn btn-primary" id="bq">查询</button></div>
</div>
<div class="tabs">
<div class="tab active" data-t="ov">数据总览</div>
<div class="tab" data-t="ud2">用户分析</div>
<div class="tab" data-t="hol">节假日分析</div>
</div>
<div class="tc active" id="tov">
<div class="sc"><div class="st">各用户月用电量汇总</div>
<div style="overflow-x:auto"><table class="dt" id="mot"><thead><tr><th>用户名称</th></tr></thead><tbody id="motb"></tbody></table></div></div>
<div class="sc"><div class="st">用电量图表</div><div class="cb" id="mbcContainer"><canvas id="mbc"></canvas></div></div>
</div>
<div class="tc" id="tud2">
<div class="sc"><div class="st" id="udt">选择一个用户查看详细分析</div><div id="udc"></div></div>
</div>
<div class="tc" id="thol">
<div class="sc"><div class="st">2026年法定节假日</div>
<div class="hg" id="hg"></div>
<div class="hdn" id="hdet" style="display:none">
<h3 id="hdt"></h3>
<div class="hps">
<div class="control-group"><label>对比范围</label><select id="hr"><option value="3">前3天+节假日+后3天</option><option value="7">前7天+节假日+后7天</option><option value="1">仅节假日</option></select></div>
<div class="control-group" style="padding-top:18px"><button class="btn btn-primary btn-sm" id="rhb">刷新分析</button></div>
</div>
<div class="cr"><div class="cb"><h3>全部用户日用电量对比</h3><canvas id="hac"></canvas></div>
<div class="cb"><h3>各用户节假日日均用电</h3><canvas id="huc"></canvas></div></div>
<div style="overflow-x:auto;margin-top:16px"><table class="dt"><thead><tr><th>用户</th><th>节前日均</th><th>节假日日均</th><th>节后日均</th><th>变化率(节前→节日)</th><th>变化率(节日→节后)</th></tr></thead><tbody id="htb"></tbody></table></div>
</div></div></div>
</div>
<script src="dashboard.js"></script>
</body>
</html>
